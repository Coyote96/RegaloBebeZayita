<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Regalo Zayita bebe</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <audio id="bgMusic" src="./assets/bg-music.mp3" autoplay loop preload="auto"></audio>
  <div class="wrapper">
    <div class="prize-modal" aria-hidden="true">
      <div class="prize-modal__backdrop"></div>
      <div class="prize-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="prizeModalText">
        <img class="prize-modal__image" alt="Premio ganado">
        <div class="prize-modal__text" id="prizeModalText"></div>
        <button class="prize-modal__ok" type="button">OK</button>
      </div>
    </div>
    <div class="collection-box pix"></div>
    <div class="claw-machine">
      <div class="box pix">
        <div class="machine-top pix">
          <div class="arm-joint pix">
            <div class="arm pix">
              <div class="claws pix"></div>
            </div>
          </div>
          <div class="rail vert pix"></div>
          <div class="rail hori pix"></div>
        </div>
        <div class="machine-bottom pix">
          <div class="collection-point pix"></div>
        </div>
      </div>
      <div class="control pix">
        <div class="cover left"></div>
        <button class="hori-btn pix"></button>
        <button class="vert-btn pix"></button>
        <div class="cover right">
          <div class="instruction pix"></div>
        </div>
        <div class="cover bottom"></div>
        <div class="cover top">
          <div class="collection-arrow pix"></div>
        </div>
        <div class="collection-point pix"></div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
  
</html>
